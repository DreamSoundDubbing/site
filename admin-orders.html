<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление заказами - Dream Sound Dubbing</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="firebase-config.js"></script>
    <style>
        .order-item {
            background: var(--bg-order-item);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
            border: 1px solid var(--border-primary);
            transition: all 0.3s;
        }
        .order-item:hover {
            border-color: var(--color-accent);
            box-shadow: 0 4px 15px rgba(74, 144, 217, 0.1);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            align-items: center;
        }
        .order-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--color-accent);
        }
        .order-price {
            font-size: 18px;
            font-weight: bold;
            color: var(--color-accent);
        }
        .order-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            color: var(--text-muted);
            font-size: 13px;
            margin: 8px 0;
        }
        .order-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .order-actions select {
            padding: 6px 14px;
            border-radius: 20px;
            border: 2px solid var(--border-primary);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 14px;
        }
        .order-actions select:focus {
            border-color: var(--color-accent);
            outline: none;
        }
        .btn-update {
            padding: 6px 20px;
            background: var(--gradient-primary);
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(74, 144, 217, 0.3);
        }
        .btn-delete {
            padding: 6px 20px;
            background: var(--color-danger);
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-delete:hover {
            background: #e05555;
        }
        .status-badge {
            display: inline-block;
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-paid { background: #d4edda; color: #155724; }
        .status-completed { background: #cce5ff; color: #004085; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        
        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: var(--bg-filter-search);
            border-radius: 12px;
            border: 1px solid var(--border-primary);
            align-items: center;
        }
        .filters select, .filters input {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid var(--border-primary);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        .filters select:focus, .filters input:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 15px rgba(74, 144, 217, 0.15);
        }
        .filters .search-group {
            display: flex;
            gap: 8px;
            flex: 1;
            min-width: 200px;
        }
        .filters .search-group input {
            flex: 1;
            min-width: 150px;
        }
        .filters .search-group .btn-search {
            padding: 8px 20px;
            background: var(--gradient-primary);
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .filters .search-group .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(74, 144, 217, 0.3);
        }
        .filters .search-group .btn-clear {
            padding: 8px 16px;
            background: var(--bg-input);
            color: var(--text-muted);
            border: 2px solid var(--border-primary);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filters .search-group .btn-clear:hover {
            border-color: var(--color-accent);
            color: var(--text-primary);
        }
        .filter-label {
            color: var(--text-muted);
            font-weight: bold;
            font-size: 14px;
        }
        .filters .filter-divider {
            color: var(--border-primary);
            font-size: 20px;
        }
        .stats-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .stat-card {
            flex: 1;
            min-width: 100px;
            padding: 15px;
            background: var(--bg-stat-card);
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-primary);
            cursor: pointer;
            transition: all 0.3s;
        }
        .stat-card:hover {
            border-color: var(--color-accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(74, 144, 217, 0.1);
        }
        .stat-card .number {
            font-size: 28px;
            font-weight: bold;
            color: var(--color-accent);
        }
        .stat-card .label {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 4px;
        }
        .stat-card.active {
            border-color: var(--color-accent);
            background: var(--bg-welcome);
        }
        .access-denied {
            text-align: center;
            padding: 60px 20px;
        }
        .access-denied h2 {
            color: var(--color-danger);
        }
        .access-denied p {
            color: var(--text-muted);
        }
        .no-results {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        .no-results .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }
        .result-count {
            color: var(--text-muted);
            font-size: 14px;
            margin-left: auto;
        }
        .result-count strong {
            color: var(--color-accent);
        }

        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            .filters .search-group {
                flex-wrap: wrap;
            }
            .filters .search-group input {
                min-width: 100%;
            }
            .filters .filter-divider {
                display: none;
            }
            .stats-row {
                justify-content: center;
            }
            .stat-card {
                min-width: 80px;
                padding: 10px;
            }
            .stat-card .number {
                font-size: 22px;
            }
            .order-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            .order-meta {
                flex-direction: column;
                gap: 5px;
            }
            .order-actions {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

<header class="fixed-header">
    <div class="nav-buttons">
        <a href="index.html">
            <img src="logo1.jpg" alt="Dream Sound Dubbing" class="header-logo">
        </a>
        <a href="index.html" class="nav-icon-btn">🏠Главная</a>
        <a href="titles.html" class="nav-icon-btn">🎦Тайтлы</a>
        <a href="sostav.html" class="nav-icon-btn">🎭Состав</a>
        <a href="dub-in.html" class="nav-icon-btn" id="dubInLink" style="display:none;">🎙️DUB-in</a>
        <a href="search.html" class="nav-icon-btn">🔍Поиск</a>
        <a href="login.html" class="nav-icon-btn" id="authBtn">🔑 Вход</a>
        <a href="voice-order.html" class="nav-icon-btn">📝Заявка</a>
        <a href="admin-orders.html" class="nav-icon-btn" id="adminLink" style="display:none;">📋 Заказы</a>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Переключить тему">☀️</button>
    </div>
</header>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        const btn = document.getElementById('themeToggle');
        if (btn) {
            btn.innerHTML = newTheme === 'dark' ? '🌙' : '☀️';
        }
    }

    function loadTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const btn = document.getElementById('themeToggle');
        if (btn) {
            btn.innerHTML = savedTheme === 'dark' ? '🌙' : '☀️';
        }
    }

    loadTheme();
</script>

<div class="container">
    <div class="header">
        <h1 class="title">📋 Управление заказами</h1>
        <hr>
    </div>
    
    <div class="content-box" id="adminOrdersContent">
        <div class="loading" style="text-align:center; padding:40px; color:var(--text-muted);">⏳ Проверка доступа...</div>
    </div>
</div>

<script type="module">
    import { 
        getCurrentUser, 
        onAuthStateChangedListener,
        getUserRole,
        getVoiceOrders,
        updateVoiceOrder
    } from './firebase-config.js';
    
    // Импортируем Firebase напрямую
    import { deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { db } from './firebase-config.js';

    let allOrders = [];
    let filteredOrders = [];
    let currentUser = null;
    let isAdmin = false;
    let currentFilter = 'all';
    let currentSearchQuery = '';

    function updateAuthButton(user) {
        const btn = document.getElementById('authBtn');
        if (user) {
            btn.textContent = `👤 ${user.displayName || user.email || 'Профиль'}`;
            btn.href = 'profile.html';
        } else {
            btn.textContent = '🔑 Вход';
            btn.href = 'login.html';
        }
    }

    async function updateDubInLink(user) {
        const link = document.getElementById('dubInLink');
        if (!link) return;
        if (user) {
            const role = await getUserRole(user.uid);
            link.style.display = (role === 'dubber' || role === 'admin') ? 'inline-flex' : 'none';
        } else {
            link.style.display = 'none';
        }
    }

    async function updateAdminLink(user) {
        const link = document.getElementById('adminLink');
        if (!link) return;
        if (user) {
            const role = await getUserRole(user.uid);
            link.style.display = role === 'admin' ? 'inline-flex' : 'none';
        } else {
            link.style.display = 'none';
        }
    }

    const statusMap = {
        'pending': { label: '⏳ Ожидает оплаты', class: 'status-pending' },
        'paid': { label: '✅ Оплачено', class: 'status-paid' },
        'completed': { label: '🎉 Выполнено', class: 'status-completed' },
        'cancelled': { label: '❌ Отменено', class: 'status-cancelled' }
    };

    function filterOrders() {
        let result = allOrders;
        if (currentFilter !== 'all') {
            result = result.filter(o => o.status === currentFilter);
        }
        if (currentSearchQuery.trim()) {
            const query = currentSearchQuery.trim().toLowerCase();
            result = result.filter(o => {
                const searchable = [
                    o.title,
                    o.type,
                    o.userName,
                    o.userEmail,
                    o.description,
                    o.id
                ].join(' ').toLowerCase();
                return searchable.includes(query);
            });
        }
        filteredOrders = result;
        return result;
    }

    function renderOrders() {
        const container = document.getElementById('adminOrdersContent');
        const filtered = filterOrders();
        
        const stats = {
            total: allOrders.length,
            pending: allOrders.filter(o => o.status === 'pending').length,
            paid: allOrders.filter(o => o.status === 'paid').length,
            completed: allOrders.filter(o => o.status === 'completed').length,
            cancelled: allOrders.filter(o => o.status === 'cancelled').length
        };
        
        let html = `
            <div class="stats-row">
                <div class="stat-card ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">
                    <div class="number">${stats.total}</div>
                    <div class="label">📊 Всего</div>
                </div>
                <div class="stat-card ${currentFilter === 'pending' ? 'active' : ''}" onclick="setFilter('pending')">
                    <div class="number">${stats.pending}</div>
                    <div class="label">⏳ Ожидают</div>
                </div>
                <div class="stat-card ${currentFilter === 'paid' ? 'active' : ''}" onclick="setFilter('paid')">
                    <div class="number">${stats.paid}</div>
                    <div class="label">✅ Оплачено</div>
                </div>
                <div class="stat-card ${currentFilter === 'completed' ? 'active' : ''}" onclick="setFilter('completed')">
                    <div class="number">${stats.completed}</div>
                    <div class="label">🎉 Выполнено</div>
                </div>
                <div class="stat-card ${currentFilter === 'cancelled' ? 'active' : ''}" onclick="setFilter('cancelled')">
                    <div class="number">${stats.cancelled}</div>
                    <div class="label">❌ Отменено</div>
                </div>
            </div>
            
            <div class="filters">
                <span class="filter-label">🔍 Поиск:</span>
                <div class="search-group">
                    <input type="text" id="searchInput" placeholder="По названию, пользователю, описанию..." value="${currentSearchQuery}" onkeydown="if(event.key==='Enter') applySearch()">
                    <button class="btn-search" onclick="applySearch()">🔍 Найти</button>
                    <button class="btn-clear" onclick="clearSearch()">✕ Очистить</button>
                </div>
                <span class="filter-divider">|</span>
                <span class="filter-label">📂 Статус:</span>
                <select id="statusFilter" onchange="applyFilter()">
                    <option value="all" ${currentFilter === 'all' ? 'selected' : ''}>Все</option>
                    <option value="pending" ${currentFilter === 'pending' ? 'selected' : ''}>⏳ Ожидают</option>
                    <option value="paid" ${currentFilter === 'paid' ? 'selected' : ''}>✅ Оплачено</option>
                    <option value="completed" ${currentFilter === 'completed' ? 'selected' : ''}>🎉 Выполнено</option>
                    <option value="cancelled" ${currentFilter === 'cancelled' ? 'selected' : ''}>❌ Отменено</option>
                </select>
                <span class="result-count">Найдено: <strong>${filtered.length}</strong> из ${allOrders.length}</span>
            </div>
        `;
        
        if (filtered.length === 0) {
            html += `
                <div class="no-results">
                    <span class="icon">🔍</span>
                    <p>${currentSearchQuery ? 'По вашему запросу ничего не найдено' : 'Нет заказов'}</p>
                    ${currentSearchQuery ? `<small style="color:var(--text-muted);">Попробуйте изменить поисковый запрос</small>` : ''}
                </div>
            `;
        } else {
            html += filtered.map(order => `
                <div class="order-item">
                    <div class="order-header">
                        <span class="order-title">${order.title}</span>
                        <span class="order-price">${order.price} ₽</span>
                    </div>
                    <div class="order-meta">
                        <span>📂 ${order.type}</span>
                        <span>🎬 ${order.episodes} серий</span>
                        <span>👤 ${order.userName || order.userEmail || 'Неизвестно'}</span>
                        <span>📅 ${order.createdAt ? new Date(order.createdAt.seconds * 1000).toLocaleDateString() : ''}</span>
                        <span class="status-badge ${statusMap[order.status]?.class || 'status-pending'}">${statusMap[order.status]?.label || order.status}</span>
                    </div>
                    ${order.description ? `<p style="color:var(--text-muted); font-size:14px; margin:5px 0;">📝 ${order.description}</p>` : ''}
                    <div class="order-actions">
                        <span style="color:var(--text-muted); font-size:13px;">Изменить статус:</span>
                        <select id="statusSelect_${order.id}">
                            <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>⏳ Ожидает оплаты</option>
                            <option value="paid" ${order.status === 'paid' ? 'selected' : ''}>✅ Оплачено</option>
                            <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>🎉 Выполнено</option>
                            <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>❌ Отменено</option>
                        </select>
                        <button class="btn-update" onclick="updateOrder('${order.id}')">💾 Обновить</button>
                        <button class="btn-delete" onclick="deleteOrder('${order.id}')">🗑️ Удалить</button>
                    </div>
                </div>
            `).join('');
        }
        
        container.innerHTML = html;
    }

    window.setFilter = function(filter) {
        currentFilter = filter;
        const select = document.getElementById('statusFilter');
        if (select) select.value = filter;
        renderOrders();
    };

    window.applyFilter = function() {
        const select = document.getElementById('statusFilter');
        currentFilter = select ? select.value : 'all';
        renderOrders();
    };

    window.applySearch = function() {
        const input = document.getElementById('searchInput');
        currentSearchQuery = input ? input.value : '';
        renderOrders();
    };

    window.clearSearch = function() {
        const input = document.getElementById('searchInput');
        if (input) input.value = '';
        currentSearchQuery = '';
        renderOrders();
    };

    window.updateOrder = async function(orderId) {
        const select = document.getElementById(`statusSelect_${orderId}`);
        if (!select) return;
        const newStatus = select.value;
        if (!confirm(`Изменить статус заказа на "${statusMap[newStatus]?.label || newStatus}"?`)) return;
        const result = await updateVoiceOrder(orderId, { status: newStatus });
        if (result.success) {
            alert('✅ Статус обновлён!');
            await loadOrders();
        } else {
            alert('❌ Ошибка: ' + result.error);
        }
    };

    window.deleteOrder = async function(orderId) {
        if (!confirm('Удалить этот заказ? Это действие нельзя отменить!')) return;
        try {
            await deleteDoc(doc(db, "voiceOrders", orderId));
            alert('✅ Заказ удалён!');
            await loadOrders();
        } catch (error) {
            alert('❌ Ошибка: ' + error.message);
        }
    };

    async function loadOrders() {
        const container = document.getElementById('adminOrdersContent');
        container.innerHTML = '<div class="loading" style="text-align:center; padding:40px; color:var(--text-muted);">⏳ Загрузка заказов...</div>';
        const result = await getVoiceOrders();
        if (!result.success) {
            container.innerHTML = `<p style="color:var(--color-danger);">❌ Ошибка: ${result.error}</p>`;
            return;
        }
        allOrders = result.orders;
        renderOrders();
    }

    async function checkAccess() {
        const container = document.getElementById('adminOrdersContent');
        const user = getCurrentUser();
        if (!user) {
            container.innerHTML = `
                <div class="access-denied">
                    <h2>🔒 Доступ запрещён</h2>
                    <p>Только <strong style="color:var(--color-accent);">администраторы</strong> имеют доступ к этой странице.</p>
                    <p><a href="login.html" style="color:var(--color-accent);">Войдите</a> в аккаунт</p>
                    <br>
                    <a href="index.html" style="color:var(--color-accent); text-decoration:none;">🏠 На главную</a>
                </div>
            `;
            return false;
        }
        const role = await getUserRole(user.uid);
        if (role !== 'admin') {
            container.innerHTML = `
                <div class="access-denied">
                    <h2>🚫 Недостаточно прав</h2>
                    <p>Ваша роль: <strong style="color:var(--color-warning);">${role}</strong></p>
                    <p>Для доступа к этой странице нужна роль <strong style="color:var(--color-accent);">Администратор</strong>.</p>
                    <br>
                    <a href="index.html" style="color:var(--color-accent); text-decoration:none;">🏠 На главную</a>
                </div>
            `;
            return false;
        }
        return true;
    }

    async function initPage() {
        const user = getCurrentUser();
        currentUser = user;
        updateAuthButton(user);
        await updateDubInLink(user);
        await updateAdminLink(user);
        const hasAccess = await checkAccess();
        if (hasAccess) {
            await loadOrders();
        }
    }

    onAuthStateChangedListener(async (user) => {
        currentUser = user;
        updateAuthButton(user);
        await updateDubInLink(user);
        await updateAdminLink(user);
        await initPage();
    });

    document.addEventListener('DOMContentLoaded', initPage);
</script>

</body>
</html>

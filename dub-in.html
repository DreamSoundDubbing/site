<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUB-in - Dream Sound Dubbing</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="firebase-config.js"></script>
    <style>
        .dub-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            margin-top: 20px;
        }
        .dub-card {
            width: 210px;
            background: var(--bg-dub-card);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid var(--border-secondary);
            text-decoration: none;
            color: inherit;
        }
        .dub-card:hover {
            transform: translateY(-8px);
            border-color: var(--color-accent);
            box-shadow: var(--shadow-hover);
        }
        .dub-card-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
        }
        .dub-card-info {
            padding: 12px;
            text-align: center;
        }
        .dub-card-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--color-accent);
            margin-bottom: 5px;
        }
        .dub-card-meta {
            font-size: 14px;
            color: var(--text-muted);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: var(--bg-modal);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid var(--color-accent);
            position: relative;
        }
        .modal-content h2 {
            color: var(--color-accent);
            margin-bottom: 20px;
            text-align: center;
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            color: var(--text-muted);
            cursor: pointer;
            background: none;
            border: none;
            transition: color 0.3s;
        }
        .modal-close:hover {
            color: var(--text-primary);
        }
        .material-section {
            margin: 20px 0;
        }
        .material-section h3 {
            color: var(--color-accent);
            font-size: 18px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border-primary);
            padding-bottom: 8px;
        }
        .material-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: var(--bg-material);
            border-radius: 8px;
            margin-bottom: 8px;
            transition: background 0.3s;
        }
        .material-item:hover {
            background: var(--bg-material-hover);
        }
        .material-item a {
            color: var(--color-accent);
            text-decoration: none;
            word-break: break-all;
        }
        .material-item a:hover {
            text-decoration: underline;
        }
        .material-item .delete-btn {
            background: var(--color-danger);
            color: #fff;
            border: none;
            padding: 4px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
        }
        .material-item .delete-btn:hover {
            background: #e05555;
        }
        .add-material-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .add-material-form input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-primary);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 14px;
            min-width: 150px;
        }
        .add-material-form input:focus {
            border-color: var(--color-accent);
            outline: none;
        }
        .add-material-form select {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-primary);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 14px;
        }
        .add-material-form button {
            padding: 8px 20px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .add-material-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 144, 217, 0.3);
        }
        .no-materials {
            color: var(--text-muted);
            text-align: center;
            padding: 10px;
        }
        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        .access-denied {
            text-align: center;
            padding: 60px 20px;
        }
        .access-denied h2 {
            color: var(--color-danger);
            font-size: 28px;
        }
        .access-denied p {
            color: var(--text-muted);
            margin: 20px 0;
        }
        .access-denied a {
            color: var(--color-accent);
            text-decoration: none;
            font-weight: bold;
        }
        .access-denied a:hover {
            text-decoration: underline;
        }

        /* ===== АДМИН-ПАНЕЛЬ ===== */
        .admin-toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            padding: 15px;
            background: var(--bg-admin-panel);
            border-radius: 15px;
            border: 1px solid var(--color-accent);
            align-items: center;
        }
        .admin-toolbar .admin-btn {
            padding: 8px 20px;
            background: var(--gradient-primary);
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .admin-toolbar .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 144, 217, 0.3);
        }
        .admin-toolbar .admin-status {
            color: var(--text-muted);
            font-size: 14px;
            margin-left: auto;
        }

        /* ===== МОДАЛКА ДОБАВЛЕНИЯ ТАЙТЛА ===== */
        .add-title-form .form-group {
            margin-bottom: 15px;
        }
        .add-title-form .form-group label {
            color: var(--text-muted);
            font-size: 14px;
            display: block;
            margin-bottom: 5px;
        }
        .add-title-form .form-group input,
        .add-title-form .form-group textarea,
        .add-title-form .form-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid var(--border-primary);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 14px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .add-title-form .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .add-title-form .form-group input:focus,
        .add-title-form .form-group textarea:focus {
            border-color: var(--color-accent);
            outline: none;
        }
        .add-title-form .form-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .add-title-form .form-row .form-group {
            flex: 1;
            min-width: 150px;
        }
        .add-title-form .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--gradient-primary);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .add-title-form .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 144, 217, 0.3);
        }
        .add-title-form .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        const btn = document.getElementById('themeToggle');
        if (btn) {
            btn.innerHTML = newTheme === 'dark' ? '🌙' : '☀️';
        }
    }

    function loadTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const btn = document.getElementById('themeToggle');
        if (btn) {
            btn.innerHTML = savedTheme === 'dark' ? '🌙' : '☀️';
        }
    }

    document.addEventListener('DOMContentLoaded', loadTheme);
</script>

    <div class="content-box">

<!-- Модалка для добавления тайтла -->

            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Тип</label>
                    <select id="newTitleType">
                        <option value="Сериал">Сериал</option>
                        <option value="Фильм">Фильм</option>

                <div class="form-group">

            <div class="form-group">
                <label>Жанры (через запятую)</label>
                <input type="text" id="newTitleGenres" placeholder="Комедия, Экшен, Романтика">
            </div>
            
            <div class="form-group">
                <label>Ссылка на вертикальную обложку</label>
                <input type="text" id="newTitleImageVert" placeholder="images/title_vert.jpg">
            </div>
            
            <div class="form-group">
                <label>Ссылка на горизонтальную обложку</label>
                <input type="text" id="newTitleImageHoriz" placeholder="images/title_horiz.jpg">

<div class="container" style="text-align: center;">
    <hr>
    <p style="color:var(--text-muted);">© 2026 Dream Sound Dubbing</p>
</div>

<script type="module">
    import { 
        getCurrentUser, 
        onAuthStateChangedListener,
        getTitles,
        addTitle,
        getDubMaterials,
        addDubMaterial,
        removeDubMaterial,
        getUserRole
    } from './firebase-config.js';

    let currentUser = null;
    let currentUserRole = 'user';
    let currentTitleId = null;
    let allTitles = [];

    function updateAuthButton(user) {
        const btn = document.getElementById('authBtn');
        if (user) {
            btn.textContent = `👤 ${user.displayName || user.email || 'Профиль'}`;
            btn.href = 'profile.html';
        } else {
            btn.textContent = '🔑 Вход';
            btn.href = 'login.html';
        }
    }

    async function updateDubInLink(user) {
        const link = document.getElementById('dubInLink');
        if (!link) return;
        if (user) {
            const role = await getUserRole(user.uid);
            link.style.display = (role === 'dubber' || role === 'admin') ? 'inline-flex' : 'none';
        } else {
            link.style.display = 'none';
        }
    }

    async function updateAdminLink(user) {
        const link = document.getElementById('adminLink');
        if (!link) return;
        if (user) {
            const role = await getUserRole(user.uid);
            link.style.display = role === 'admin' ? 'inline-flex' : 'none';
        } else {
            link.style.display = 'none';
        }
    }

    // ===== ОТКРЫТИЕ/ЗАКРЫТИЕ МОДАЛКИ ДОБАВЛЕНИЯ ТАЙТЛА =====
    window.openAddTitleModal = function() {
        document.getElementById('addTitleModal').classList.add('active');
        document.body.style.overflow = 'hidden';
        document.getElementById('addTitleForm').reset();
        document.getElementById('addTitleSubmitBtn').disabled = false;
        document.getElementById('addTitleSubmitBtn').textContent = '💾 Создать тайтл';
    };

    window.closeAddTitleModal = function() {
        document.getElementById('addTitleModal').classList.remove('active');
        document.body.style.overflow = '';
    };

    document.getElementById('addTitleModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeAddTitleModal();
        }
    });

    // ===== СОХРАНЕНИЕ НОВОГО ТАЙТЛА =====
    window.saveNewTitle = async function(event) {
        event.preventDefault();
        const submitBtn = document.getElementById('addTitleSubmitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ Сохранение...';

        const id = document.getElementById('newTitleId').value.trim();
        const name = document.getElementById('newTitleName').value.trim();
        const nameEn = document.getElementById('newTitleNameEn').value.trim();
        const type = document.getElementById('newTitleType').value;
        const year = parseInt(document.getElementById('newTitleYear').value) || 0;
        const episodes = parseInt(document.getElementById('newTitleEpisodes').value) || 0;
        const rating = parseFloat(document.getElementById('newTitleRating').value) || 0;
        const genres = document.getElementById('newTitleGenres').value.split(',').map(s => s.trim()).filter(Boolean);
        const imageVertical = document.getElementById('newTitleImageVert').value.trim();
        const imageHorizontal = document.getElementById('newTitleImageHoriz').value.trim();
        const description = document.getElementById('newTitleDescription').value.trim();

        if (!id || !name) {
            alert('❌ Заполните ID и название тайтла');
            submitBtn.disabled = false;
            submitBtn.textContent = '💾 Создать тайтл';
            return;
        }

        const data = {
            id: id,
            name: name,
            nameEn: nameEn,
            type: type,
            year: year,
            episodes: episodes || 1,
            rating: rating,
            genres: genres,
            imageVertical: imageVertical,
            imageHorizontal: imageHorizontal,
            description: description,
            episodesList: []
        };

        const result = await addTitle(data);
        if (result.success) {
            alert('✅ Тайтл успешно создан!');
            closeAddTitleModal();
            await loadTitles();
        } else {
            alert('❌ Ошибка: ' + result.error);
            submitBtn.disabled = false;
            submitBtn.textContent = '💾 Создать тайтл';
        }
    };

    // ===== ОБНОВЛЕНИЕ СПИСКА ТАЙТЛОВ =====
    window.refreshTitles = async function() {
        await loadTitles();
    };

    // ===== ОТКРЫТИЕ МОДАЛКИ С МАТЕРИАЛАМИ =====
    window.openModal = function(titleId, titleName) {
        currentTitleId = titleId;
        const overlay = document.getElementById('modalOverlay');
        const body = document.getElementById('modalBody');
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        body.innerHTML = '<div class="loading-spinner">⏳ Загрузка материалов...</div>';
        loadMaterials(titleId, titleName);
    };

    window.closeModal = function() {
        document.getElementById('modalOverlay').classList.remove('active');
        document.body.style.overflow = '';
        currentTitleId = null;
    };

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) {
            closeModal();
        }
    });

    // ===== ЗАГРУЗКА МАТЕРИАЛОВ =====
    async function loadMaterials(titleId, titleName) {
        const body = document.getElementById('modalBody');
        const isAdminUser = currentUserRole === 'admin';
        const isDubberUser = currentUserRole === 'dubber' || currentUserRole === 'admin';
        
        const result = await getDubMaterials(titleId);
        if (!result.success) {
            body.innerHTML = `<p style="color:var(--color-danger);">❌ Ошибка загрузки: ${result.error}</p>`;
            return;
        }
        
        const data = result.data;
        const raw = data.raw || [];
        const softsubs = data.softsubs || [];
        const hardsubs = data.hardsubs || [];

        let html = `
            <h2>${titleName}</h2>
            <p style="color:var(--text-muted); margin-bottom:20px;">Материалы для озвучки</p>
            ${!isDubberUser ? `
                <div style="background:var(--bg-welcome); padding:15px; border-radius:10px; text-align:center; color:var(--text-muted); margin-bottom:20px;">
                    🔒 Для доступа к материалам нужна роль <strong style="color:var(--color-accent);">Даббер</strong> или <strong style="color:var(--color-accent);">Админ</strong>
                </div>
            ` : ''}
        `;

        html += `<div class="material-section">
            <h3>🎬 RAW (оригинал)</h3>`;
        if (raw.length === 0) {
            html += `<div class="no-materials">Нет материалов</div>`;
        } else {
            raw.forEach((item, index) => {
                html += `
                    <div class="material-item">
                        <a href="${item}" target="_blank">${item}</a>
                        ${isAdminUser ? `<button class="delete-btn" onclick="deleteMaterial('${titleId}','raw',${index})">🗑️</button>` : ''}
                    </div>
                `;
            });
        }
        if (isAdminUser) {
            html += `
                <div class="add-material-form">
                    <input type="text" id="rawInput" placeholder="Ссылка на Google Drive">
                    <button onclick="addMaterial('${titleId}','raw')">➕ Добавить</button>
                </div>
            `;
        }
        html += `</div>`;

        html += `<div class="material-section">
            <h3>📝 Софтсабы (.ass)</h3>`;
        if (softsubs.length === 0) {
            html += `<div class="no-materials">Нет материалов</div>`;
        } else {
            softsubs.forEach((item, index) => {
                html += `
                    <div class="material-item">
                        <a href="${item}" target="_blank">${item}</a>
                        ${isAdminUser ? `<button class="delete-btn" onclick="deleteMaterial('${titleId}','softsubs',${index})">🗑️</button>` : ''}
                    </div>
                `;
            });
        }
        if (isAdminUser) {
            html += `
                <div class="add-material-form">
                    <input type="text" id="softsubsInput" placeholder="Ссылка на Google Drive">
                    <button onclick="addMaterial('${titleId}','softsubs')">➕ Добавить</button>
                </div>
            `;
        }
        html += `</div>`;

        html += `<div class="material-section">
            <h3>🎥 Хардсабы (со встроенными субтитрами)</h3>`;
        if (hardsubs.length === 0) {
            html += `<div class="no-materials">Нет материалов</div>`;
        } else {
            hardsubs.forEach((item, index) => {
                html += `
                    <div class="material-item">
                        <a href="${item}" target="_blank">${item}</a>
                        ${isAdminUser ? `<button class="delete-btn" onclick="deleteMaterial('${titleId}','hardsubs',${index})">🗑️</button>` : ''}
                    </div>
                `;
            });
        }
        if (isAdminUser) {
            html += `
                <div class="add-material-form">
                    <input type="text" id="hardsubsInput" placeholder="Ссылка на Google Drive">
                    <button onclick="addMaterial('${titleId}','hardsubs')">➕ Добавить</button>
                </div>
            `;
        }
        html += `</div>`;

        if (!isDubberUser) {
            html += `
                <div style="text-align:center; margin-top:20px; padding:15px; background:var(--bg-welcome); border-radius:10px;">
                    <a href="login.html" style="color:var(--color-accent);">Войдите</a> или запросите роль у администратора
                </div>
            `;
        }

        body.innerHTML = html;
    }

    // ===== ДОБАВЛЕНИЕ МАТЕРИАЛА =====
    window.addMaterial = async function(titleId, type) {
        const inputId = type + 'Input';
        const input = document.getElementById(inputId);
        if (!input) return;
        const url = input.value.trim();
        if (!url) {
            alert('Введите ссылку на Google Drive');
            return;
        }
        const result = await addDubMaterial(titleId, type, url);
        if (result.success) {
            input.value = '';
            const titleName = document.querySelector('.modal-content h2')?.textContent || '';
            await loadMaterials(titleId, titleName);
        } else {
            alert('❌ Ошибка: ' + result.error);
        }
    };

    // ===== УДАЛЕНИЕ МАТЕРИАЛА =====
    window.deleteMaterial = async function(titleId, type, index) {
        if (!confirm('Удалить этот материал?')) return;
        const result = await removeDubMaterial(titleId, type, index);
        if (result.success) {
            const titleName = document.querySelector('.modal-content h2')?.textContent || '';
            await loadMaterials(titleId, titleName);
        } else {
            alert('❌ Ошибка: ' + result.error);
        }
    };

    // ===== ЗАГРУЗКА ТАЙТЛОВ =====
    async function loadTitles() {
        const container = document.getElementById('dubContent');
        const titlesResult = await getTitles();
        if (!titlesResult.success) {
            container.innerHTML = `<p style="color:var(--color-danger);">❌ Ошибка загрузки: ${titlesResult.error}</p>`;
            return;
        }
        allTitles = titlesResult.titles;
        if (allTitles.length === 0) {
            container.innerHTML = '<p style="color:var(--text-muted); text-align:center; padding:40px;">Пока нет тайтлов. Создайте первый!</p>';
            return;
        }
        container.innerHTML = `
            <div class="dub-grid">
                ${allTitles.map(title => {
                    const image = title.imageVertical || title.imageHorizontal || title.image;
                    return `
                        <div class="dub-card" onclick="openModal('${title.id}','${title.name}')">
                            <img src="${image}" alt="${title.name}" class="dub-card-image" onerror="this.src='https://via.placeholder.com/210x280/d4e8ff/4a90d9?text=${encodeURIComponent(title.name)}'">
                            <div class="dub-card-info">
                                <div class="dub-card-name">${title.name}</div>
                                <div class="dub-card-meta">${title.type} • ${title.episodes} серий</div>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
    }

    // ===== ПРОВЕРКА ДОСТУПА =====
    async function checkAccess() {
        const container = document.getElementById('dubContent');
        const user = getCurrentUser();
        if (!user) {
            container.innerHTML = `
                <div class="access-denied">
                    <h2>🔒 Доступ запрещён</h2>
                    <p>Только <strong style="color:var(--color-accent);">дабберы</strong> и <strong style="color:var(--color-accent);">администраторы</strong> имеют доступ к этой странице.</p>
                    <p><a href="login.html">Войдите</a> в аккаунт или обратитесь к администратору.</p>
                    <p>Если вы <strong style="color:var(--color-accent);">даббер</strong> или <strong style="color:var(--color-accent);">администратор</strong>, подождите загрузку страницы.</p>
                    <br>
                    <a href="index.html" style="color:var(--color-accent); text-decoration:none;">🏠 На главную</a>
                </div>
            `;
            return false;
        }
        const role = await getUserRole(user.uid);
        currentUserRole = role;
        if (role !== 'dubber' && role !== 'admin') {
            container.innerHTML = `
                <div class="access-denied">
                    <h2>🚫 Недостаточно прав</h2>
                    <p>Ваша роль: <strong style="color:var(--color-warning);">${role}</strong></p>
                    <p>Для доступа к этой странице нужна роль <strong style="color:var(--color-accent);">Даббер</strong> или <strong style="color:var(--color-accent);">Администратор</strong>.</p>
                    <p>Обратитесь к администратору для изменения роли.</p>
                    <br>
                    <a href="index.html" style="color:var(--color-accent); text-decoration:none;">🏠 На главную</a>
                </div>
            `;
            return false;
        }
        return true;
    }

    // ===== ИНИЦИАЛИЗАЦИЯ =====
    async function initPage() {
        const user = getCurrentUser();
        updateAuthButton(user);
        await updateDubInLink(user);
        await updateAdminLink(user);
        
        const hasAccess = await checkAccess();
        if (hasAccess) {
            // Показываем админ-панель только для админов
            const adminPanel = document.getElementById('adminPanel');
            if (currentUserRole === 'admin') {
                adminPanel.style.display = 'flex';
            } else {
                adminPanel.style.display = 'none';
            }
            await loadTitles();
        }
    }

    onAuthStateChangedListener(async (user) => {
        currentUser = user;
        updateAuthButton(user);
        await updateDubInLink(user);
        await updateAdminLink(user);
        await initPage();
    });

    document.addEventListener('DOMContentLoaded', initPage);
</script>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        const btn = document.getElementById('themeToggle');
        if (btn) {
            btn.innerHTML = newTheme === 'dark' ? '🌙' : '☀️';
        }
    }

    function loadTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const btn = document.getElementById('themeToggle');
        if (btn) {
            btn.innerHTML = savedTheme === 'dark' ? '🌙' : '☀️';
        }
    }

    loadTheme();
</script>

</body>

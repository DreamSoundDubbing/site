<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск - Dream Sound Dubbing</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <script type="module" src="firebase-config.js"></script>
    <style>
        .search-input {
            flex: 1;
            padding: 14px 22px;
            border: 2px solid var(--color-accent);
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: all 0.3s;
            width: 100%;
            box-sizing: border-box;
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }
        .search-input:focus {
            border-color: var(--color-accent2);
            box-shadow: 0 0 20px rgba(74, 144, 217, 0.2);
            background: var(--bg-card);
        }
        .search-button {
            padding: 14px 30px;
            background: var(--gradient-primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            white-space: nowrap;
        }
        .search-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 144, 217, 0.3);
        }
        .search-form {
            display: flex;
            width: 100%;
            max-width: 500px;
            gap: 12px;
            align-items: center;
        }
        .search-form-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            width: 100%;
        }
        .search-results-title {
            color: var(--color-accent);
            font-size: 24px;
            margin-bottom: 10px;
        }
        .search-stats {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 20px;
        }
        .search-section-title {
            color: var(--color-accent);
            font-size: 20px;
            margin: 25px 0 15px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-primary);
        }
        .result-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 18px;
            background: var(--bg-input);
            margin-bottom: 10px;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .result-item:hover {
            background: var(--bg-material-hover);
            border-color: var(--color-accent);
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(74, 144, 217, 0.1);
        }
        .result-image {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid var(--border-primary);
            flex-shrink: 0;
        }
        .result-image-voice {
            border-radius: 50%;
            border: 2px solid var(--color-accent);
        }
        .result-image-user {
            border-radius: 50%;
            border: 2px solid var(--color-accent2);
        }
        .result-info {
            flex: 1;
        }
        .result-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--color-accent);
            margin-bottom: 3px;
        }
        .result-type {
            font-size: 13px;
            color: var(--text-muted);
        }
        .result-type-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 3px;
        }
        .badge-title {
            background: var(--gradient-primary);
            color: #fff;
        }
        .badge-voice {
            background: var(--border-primary);
            color: var(--color-accent);
            border: 1px solid var(--color-accent);
        }
        .badge-user {
            background: var(--color-accent2);
            color: #fff;
        }
        .no-results {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
            font-size: 18px;
        }
        .no-results-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
        }
        .loading-text {
            color: var(--text-muted);
            text-align: center;
            padding: 30px;
        }
        .search-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-tab {
            padding: 8px 24px;
            border-radius: 25px;
            border: 2px solid var(--border-primary);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .search-tab:hover {
            border-color: var(--color-accent);
            color: var(--text-primary);
        }
        .search-tab.active {
            background: var(--gradient-primary);
            border-color: var(--color-accent);
            color: #fff;
        }

        @media (max-width: 600px) {
            .search-form {
                flex-direction: column;
                gap: 10px;
                max-width: 100%;
            }
            .search-input {
                border-radius: 30px;
                padding: 16px 20px;
                font-size: 16px;
            }
            .search-button {
                width: 100%;
                padding: 16px;
                font-size: 17px;
                border-radius: 30px;
                justify-content: center;
            }
            .result-item {
                padding: 14px 16px;
                gap: 12px;
            }
            .result-image {
                width: 48px;
                height: 48px;
            }
            .result-name {
                font-size: 16px;
            }
            .search-tabs {
                gap: 6px;
            }
            .search-tab {
                padding: 6px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<header class="fixed-header">
    <div class="nav-buttons">
        <a href="index.html">
            <img src="logo1.jpg" alt="Dream Sound Dubbing" class="header-logo">
        </a>
        <a href="index.html" class="nav-icon-btn">🏠Главная</a>
        <a href="titles.html" class="nav-icon-btn">🎦Тайтлы</a>
        <a href="sostav.html" class="nav-icon-btn">🎭Состав</a>
        <a href="dub-in.html" class="nav-icon-btn" id="dubInLink" style="display:none;">🎙️DUB-in</a>
        <a href="search.html" class="nav-icon-btn">🔍Поиск</a>
        <a href="login.html" class="nav-icon-btn" id="authBtn">🔑 Вход</a>
        <a href="voice-order.html" class="nav-icon-btn">📝Заявка</a>
        <a href="admin-orders.html" class="nav-icon-btn" id="adminLink" style="display:none;">📋 Заказы</a>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Переключить тему">☀️</button>
    </div>
</header>

<script>
    function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        const btn = document.getElementById('themeToggle');
        if (btn) {
            btn.innerHTML = newTheme === 'dark' ? '🌙' : '☀️';
        }
    }

    function loadTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const btn = document.getElementById('themeToggle');
        if (btn) {
            btn.innerHTML = savedTheme === 'dark' ? '🌙' : '☀️';
        }
    }

    document.addEventListener('DOMContentLoaded', loadTheme);
</script>

<script type="module">
    import { getCurrentUser, onAuthStateChangedListener, getUserRole, getAllUsers, getUserByEmail } from './firebase-config.js';

    let currentUser = null;
    let allUsers = [];

    function updateAuthButton(user) {
        const btn = document.getElementById('authBtn');
        if (user) {
            btn.textContent = `👤 ${user.displayName || user.email || 'Профиль'}`;
            btn.href = 'profile.html';
        } else {
            btn.textContent = '🔑 Вход';
            btn.href = 'login.html';
        }
    }

    async function updateDubInLink(user) {
        const link = document.getElementById('dubInLink');
        if (!link) return;
        if (user) {
            const role = await getUserRole(user.uid);
            link.style.display = (role === 'dubber' || role === 'admin') ? 'inline-flex' : 'none';
        } else {
            link.style.display = 'none';
        }
    }

    async function updateAdminLink(user) {
        const link = document.getElementById('adminLink');
        if (!link) return;
        if (user) {
            const role = await getUserRole(user.uid);
            link.style.display = role === 'admin' ? 'inline-flex' : 'none';
        } else {
            link.style.display = 'none';
        }
    }

    // Загрузка всех пользователей для поиска
    async function loadAllUsers() {
        const result = await getAllUsers();
        if (result.success) {
            allUsers = result.users;
        } else {
            console.error('Ошибка загрузки пользователей:', result.error);
        }
    }

    // Поиск пользователей
    function searchUsers(query) {
        if (!query || query.trim() === '') return [];
        const q = query.trim().toLowerCase();
        return allUsers.filter(user => {
            const searchable = [
                user.displayName || '',
                user.email || '',
                user.uid || ''
            ].join(' ').toLowerCase();
            return searchable.includes(q);
        });
    }

    // Поиск по всем категориям
    function performSearch(query, tab = 'all') {
        const container = document.getElementById('search-results');
        if (!query || query.trim() === '') {
            container.innerHTML = '<div class="loading-text">🔍 Введите поисковый запрос</div>';
            return;
        }

        const q = query.trim();
        let results = { titles: [], voices: [], users: [] };

        // Поиск тайтлов (из data.js)
        if (tab === 'all' || tab === 'titles') {
            const titleResults = window.searchDatabase?.(q) || { titles: [], voices: [] };
            results.titles = titleResults.titles || [];
            results.voices = titleResults.voices || [];
        }

        // Поиск пользователей (из Firestore)
        if (tab === 'all' || tab === 'users') {
            results.users = searchUsers(q);
        }

        const total = results.titles.length + results.voices.length + results.users.length;
        
        let html = `
            <div class="search-results-title">Результаты поиска</div>
            <div class="search-stats">По запросу: <strong style="color:var(--color-accent);">"${q}"</strong> — найдено <strong style="color:var(--color-accent);">${total}</strong> результатов</div>
            <hr style="border-color:var(--border-primary);">
        `;

        // Тайтлы
        if (results.titles.length > 0 && (tab === 'all' || tab === 'titles')) {
            html += `<div class="search-section-title">🎬 Тайтлы (${results.titles.length})</div>`;
            results.titles.forEach(t => {
                const image = t.imageVertical || t.imageHorizontal || t.image;
                html += `
                    <a href="title.html?id=${t.id}" class="result-item">
                        <img src="${image}" class="result-image" onerror="this.src='https://via.placeholder.com/55/d4e8ff/4a90d9?text=?'">
                        <div class="result-info">
                            <div class="result-name">${t.name}</div>
                            <div class="result-type">
                                ${t.type || 'Аниме'} • ${t.episodes || '?'} серий
                                <span class="result-type-badge badge-title">⭐ ${t.rating || '4.5'}</span>
                            </div>
                        </div>
                    </a>
                `;
            });
        }

        // Дабберы (голоса)
        if (results.voices.length > 0 && (tab === 'all' || tab === 'titles')) {
            html += `<div class="search-section-title">🎭 Дабберы (${results.voices.length})</div>`;
            results.voices.forEach(v => {
                html += `
                    <a href="voice.html?id=${v.id}" class="result-item">
                        <img src="${v.image}" class="result-image result-image-voice" onerror="this.src='https://via.placeholder.com/55/d4e8ff/4a90d9?text=?'">
                        <div class="result-info">
                            <div class="result-name">${v.name}</div>
                            <div class="result-type">
                                ${v.status || 'Даббер'}
                                <span class="result-type-badge badge-voice">${v.roleType === 'tech' ? '🔧 Тех. персонал' : v.roleType === 'both' ? '🎙️+🔧' : '🎙️ Даббер'}</span>
                            </div>
                        </div>
                    </a>
                `;
            });
        }

        // Пользователи
        if (results.users.length > 0 && (tab === 'all' || tab === 'users')) {
            html += `<div class="search-section-title">👤 Пользователи (${results.users.length})</div>`;
            results.users.forEach(u => {
                const roleNames = { 'admin': '👑 Администратор', 'dubber': '🎙️ Даббер', 'user': '👤 Пользователь' };
                const avatarUrl = u.photoURL || 'https://via.placeholder.com/55/d4e8ff/4a90d9?text=?';
                html += `
                    <a href="profile.html?uid=${u.id}" class="result-item">
                        <img src="${avatarUrl}" class="result-image result-image-user" onerror="this.src='https://via.placeholder.com/55/d4e8ff/4a90d9?text=?'">
                        <div class="result-info">
                            <div class="result-name">${u.displayName || 'Без имени'}</div>
                            <div class="result-type">
                                ${u.email || 'Email не указан'}
                                <span class="result-type-badge badge-user">${roleNames[u.role] || '👤 Пользователь'}</span>
                            </div>
                        </div>
                    </a>
                `;
            });
        }

        if (results.titles.length === 0 && results.voices.length === 0 && results.users.length === 0) {
            html += `
                <div class="no-results">
                    <span class="no-results-icon">😕</span>
                    Ничего не найдено по запросу "<strong style="color:var(--color-accent);">${q}</strong>"
                    <br><small style="color:var(--text-muted);">Попробуйте изменить запрос или проверить орфографию</small>
                </div>
            `;
        }

        container.innerHTML = html;
    }

    // Обработка поиска
    window.handleSearch = function(tab = 'all') {
        const input = document.getElementById('searchInput');
        const query = input ? input.value : '';
        
        // Обновляем активную вкладку
        document.querySelectorAll('.search-tab').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.tab === tab);
        });
        
        // Сохраняем текущий запрос в URL
        const url = new URL(window.location);
        url.searchParams.set('q', query);
        url.searchParams.set('tab', tab);
        window.history.pushState({}, '', url);
        
        performSearch(query, tab);
    };

    // Загрузка сохранённого запроса
    const urlParams = new URLSearchParams(window.location.search);
    const savedQuery = urlParams.get('q') || '';
    const savedTab = urlParams.get('tab') || 'all';

    document.addEventListener('DOMContentLoaded', async () => {
        const user = getCurrentUser();
        currentUser = user;
        updateAuthButton(user);
        await updateDubInLink(user);
        await updateAdminLink(user);
        await loadAllUsers();

        // Устанавливаем значение поля поиска
        const input = document.getElementById('searchInput');
        if (input) input.value = savedQuery;

        // Устанавливаем активную вкладку
        document.querySelectorAll('.search-tab').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.tab === savedTab);
        });

        // Выполняем поиск, если есть запрос
        if (savedQuery) {
            performSearch(savedQuery, savedTab);
        }
    });

    onAuthStateChangedListener(async (user) => {
        currentUser = user;
        updateAuthButton(user);
        await updateDubInLink(user);
        await updateAdminLink(user);
    });
</script>

<div class="container">
    <div class="header">
        <h1 class="title">Поиск</h1>
        <hr>
    </div>
    
    <div class="content-box">
        <div class="search-form-wrapper">
            <form class="search-form" onsubmit="event.preventDefault(); handleSearch(document.querySelector('.search-tab.active')?.dataset.tab || 'all');">
                <input type="text" name="q" placeholder="🔍 Поиск по тайтлам, дабберам и пользователям..." 
                       class="search-input" id="searchInput">
                <button type="submit" class="search-button">Найти</button>
            </form>
        </div>

        <!-- Вкладки поиска -->
        <div class="search-tabs">
            <button class="search-tab active" data-tab="all" onclick="handleSearch('all')">📋 Все</button>
            <button class="search-tab" data-tab="titles" onclick="handleSearch('titles')">🎬 Тайтлы</button>
            <button class="search-tab" data-tab="users" onclick="handleSearch('users')">👤 Пользователи</button>
        </div>

        <div id="search-results">
            <div class="loading-text">🔍 Введите поисковый запрос</div>
        </div>
    </div>
</div>

<div class="container" style="text-align: center;">
    <hr>
    <p style="color:var(--text-muted);">© 2026 Dream Sound Dubbing</p>
</div>

        localStorage.setItem('theme', newTheme);
        const btn = document.getElementById('themeToggle');
        if (btn) {
            btn.innerHTML = newTheme === 'dark' ? '🌙' : '☀️';
        }
    }

        const savedTheme = localStorage.getItem('theme') || 'light';

            btn.innerHTML = savedTheme === 'dark' ? '🌙' : '☀️';
        }
    }

    loadTheme();
</script>

</body>
</html>
